on:
   push:
      branches:
         - 'main'
   pull_request:
      branches:
         - 'main'

concurrency:
   group: quality-${{ github.ref }}
   cancel-in-progress: true

jobs:
   lint-and-typecheck:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - uses: actions/setup-node@v4
           with:
              node-version: 22

         - run: corepack enable

         - id: yarn-cache-dir
           run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

         - uses: actions/cache@v4
           with:
              path: ${{ steps.yarn-cache-dir.outputs.dir }}
              key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
              restore-keys: |
                 yarn-${{ runner.os }}-

         - run: yarn install --immutable

         - run: yarn lint
         - run: yarn prettier --check .
         - run: yarn tsc --noEmit

   build-check:
      runs-on: ubuntu-latest
      env:
         POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
         BETTER_AUTH_SECRET: ci-placeholder-secret
         BETTER_AUTH_URL: http://localhost:3000
      steps:
         - uses: actions/checkout@v4

         - uses: actions/setup-node@v4
           with:
              node-version: 22

         - run: corepack enable

         - id: yarn-cache-dir
           run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

         - uses: actions/cache@v4
           with:
              path: ${{ steps.yarn-cache-dir.outputs.dir }}
              key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
              restore-keys: |
                 yarn-${{ runner.os }}-

         - uses: actions/cache@v4
           with:
              path: .next/cache
              key: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{
                 hashFiles('**/*.ts', '**/*.tsx') }}
              restore-keys: |
                 nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-
                 nextjs-${{ runner.os }}-

         - run: yarn install --immutable

         - run: yarn build
