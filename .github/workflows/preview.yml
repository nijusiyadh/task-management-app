on:
   workflow_dispatch:
      inputs:
         ref:
            description: 'Branch to deploy'
            required: true
            type: string
         pr_number:
            description: 'PR number (to post the preview URL as a comment)'
            required: false
            type: string

permissions:
   pull-requests: write
   actions: read

jobs:
   check-quality:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/github-script@v7
           with:
              script: |
                 const { data } = await github.rest.actions.listWorkflowRuns({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   workflow_id: 'quality.yml',
                   branch: '${{ inputs.ref }}',
                   per_page: 1,
                 });

                 const latest = data.workflow_runs[0];

                 if (!latest) {
                   core.setFailed('No quality workflow run found for this branch.');
                   return;
                 }

                 if (latest.conclusion !== 'success') {
                   core.setFailed(`Latest quality run status: ${latest.conclusion}. Must be success before deploying preview.`);
                 }

   deploy-preview:
      name: Deploy Preview to Vercel
      runs-on: ubuntu-latest
      needs: check-quality
      environment:
         name: preview
         url: ${{ steps.deploy.outputs.preview_url }}
      steps:
         - uses: actions/checkout@v4
           with:
              ref: ${{ inputs.ref }}

         - uses: actions/setup-node@v4
           with:
              node-version: 22

         - run: npm install -g vercel@latest

         - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

         - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

         - id: deploy
           run: |
              url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
              echo "preview_url=$url" >> $GITHUB_OUTPUT

